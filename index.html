<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <button id="theme-toggle">테마 변경</button>
        <h1>로또 번호 생성기</h1>
        <div class="lotto-numbers">
            <div class="lotto-number">?</div>
            <div class="lotto-number">?</div>
            <div class="lotto-number">?</div>
            <div class="lotto-number">?</div>
            <div class="lotto-number">?</div>
            <div class="lotto-number">?</div>
        </div>
        <button id="generate-btn">번호 생성</button>

        <div class="contact-section">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/mojywpwk" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함/회사명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
